<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mis Gastos</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e293b">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { -webkit-tap-highlight-color: transparent; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans min-h-screen">

    <!-- Header -->
    <header class="bg-slate-800 text-white p-4 sticky top-0 z-10 shadow-md">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold">Mis Gastos</h1>
            <div id="today-total" class="text-sm font-medium bg-slate-700 px-3 py-1 rounded-full">
                Hoy: $0
            </div>
        </div>
    </header>

    <main class="max-w-md mx-auto p-4 pb-24">
        
        <!-- Tab 1: Registrar -->
        <section id="tab-register" class="tab-content active">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 mb-6">
                <form id="expense-form" class="space-y-4">
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Monto</label>
                        <input type="number" id="amount" placeholder="0.00" required inputmode="decimal"
                            class="w-full text-3xl font-bold border-b-2 border-slate-200 focus:border-blue-500 outline-none py-2 transition-colors">
                    </div>
                    
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Descripción</label>
                        <input type="text" id="description" placeholder="¿En qué gastaste?" required
                            class="w-full border-b-2 border-slate-200 focus:border-blue-500 outline-none py-2 transition-colors">
                    </div>

                    <div>
                        <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Método de Pago</label>
                        <div class="flex gap-2 mt-2">
                            <label class="flex-1">
                                <input type="radio" name="method" value="Efectivo" checked class="hidden peer">
                                <div class="text-center p-3 rounded-xl border-2 border-slate-100 peer-checked:border-blue-500 peer-checked:bg-blue-50 peer-checked:text-blue-700 cursor-pointer transition-all">
                                    💵 Efectivo
                                </div>
                            </label>
                            <label class="flex-1">
                                <input type="radio" name="method" value="Billetera" class="hidden peer">
                                <div class="text-center p-3 rounded-xl border-2 border-slate-100 peer-checked:border-blue-500 peer-checked:bg-blue-50 peer-checked:text-blue-700 cursor-pointer transition-all">
                                    📱 Virtual
                                </div>
                            </label>
                        </div>
                    </div>

                    <div class="pt-2">
                        <button type="submit" class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl shadow-lg shadow-blue-200 active:scale-95 transition-transform">
                            Guardar Gasto
                        </button>
                    </div>
                </form>
            </div>

            <h2 class="text-sm font-bold text-slate-400 uppercase tracking-widest mb-3">Gastos de hoy</h2>
            <div id="today-list" class="space-y-3">
                <!-- Items de hoy aparecerán aquí -->
            </div>
        </section>

        <!-- Tab 2: Historial -->
        <section id="tab-history" class="tab-content">
            <h2 class="text-lg font-bold text-slate-800 mb-4">Historial Completo</h2>
            <div id="full-history-list" class="space-y-6">
                <!-- Grupos por fecha aparecerán aquí -->
            </div>
        </section>

    </main>

    <!-- Bottom Navigation -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 px-6 py-3 shadow-[0_-4px_10px_rgba(0,0,0,0.05)]">
        <div class="max-w-md mx-auto flex justify-around items-center">
            <button onclick="switchTab('register')" id="btn-reg" class="flex flex-col items-center gap-1 text-blue-600">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                </svg>
                <span class="text-[10px] font-bold uppercase">Registrar</span>
            </button>
            <button onclick="switchTab('history')" id="btn-hist" class="flex flex-col items-center gap-1 text-slate-400">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                <span class="text-[10px] font-bold uppercase">Historial</span>
            </button>
        </div>
    </nav>

    <script>
        let expenses = JSON.parse(localStorage.getItem('expenses')) || [];

        const form = document.getElementById('expense-form');
        const todayList = document.getElementById('today-list');
        const historyList = document.getElementById('full-history-list');
        const todayTotalEl = document.getElementById('today-total');

        // Render functions
        function render() {
            const todayStr = new Date().toLocaleDateString();
            const todayExpenses = expenses.filter(e => new Date(e.date).toLocaleDateString() === todayStr);
            
            // Update Today Total
            const total = todayExpenses.reduce((sum, e) => sum + parseFloat(e.amount), 0);
            todayTotalEl.innerText = `Hoy: $${total.toLocaleString()}`;

            // Render Today's List
            todayList.innerHTML = todayExpenses.length ? '' : '<p class="text-slate-400 text-center py-4">Sin gastos hoy</p>';
            todayExpenses.reverse().forEach(e => {
                todayList.innerHTML += createExpenseCard(e);
            });

            // Render Full History
            renderHistory();
            localStorage.setItem('expenses', JSON.stringify(expenses));
        }

        function createExpenseCard(e) {
            const methodColor = e.method === 'Efectivo' ? 'bg-green-100 text-green-700' : 'bg-blue-100 text-blue-700';
            const icon = e.method === 'Efectivo' ? '💵' : '📱';
            return `
                <div class="bg-white p-4 rounded-xl border border-slate-100 flex justify-between items-center shadow-sm">
                    <div>
                        <p class="font-bold text-slate-800">${e.description}</p>
                        <span class="text-[10px] px-2 py-0.5 rounded-full font-bold uppercase ${methodColor}">${icon} ${e.method}</span>
                    </div>
                    <div class="text-right">
                        <p class="text-lg font-black text-slate-900">$${parseFloat(e.amount).toLocaleString()}</p>
                        <button onclick="deleteExpense('${e.id}')" class="text-[10px] text-red-400 font-bold uppercase">Eliminar</button>
                    </div>
                </div>
            `;
        }

        function renderHistory() {
            historyList.innerHTML = '';
            const groups = expenses.reduce((acc, e) => {
                const date = new Date(e.date).toLocaleDateString(undefined, { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
                if (!acc[date]) acc[date] = [];
                acc[date].push(e);
                return acc;
            }, {});

            Object.keys(groups).sort((a, b) => new Date(groups[b][0].date) - new Date(groups[a][0].date)).forEach(date => {
                let dayTotal = groups[date].reduce((sum, e) => sum + parseFloat(e.amount), 0);
                let section = `<div class="space-y-3">
                    <div class="flex justify-between items-end border-b border-slate-200 pb-1">
                        <h3 class="text-xs font-bold text-slate-400 uppercase">${date}</h3>
                        <span class="text-xs font-bold text-slate-800">Total: $${dayTotal.toLocaleString()}</span>
                    </div>`;
                groups[date].reverse().forEach(e => {
                    section += createExpenseCard(e);
                });
                section += '</div>';
                historyList.innerHTML += section;
            });
        }

        // Logic
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const newExpense = {
                id: Date.now().toString(),
                amount: document.getElementById('amount').value,
                description: document.getElementById('description').value,
                method: document.querySelector('input[name="method"]:checked').value,
                date: new Date().toISOString()
            };
            expenses.push(newExpense);
            form.reset();
            render();
        });

        window.deleteExpense = (id) => {
            if(confirm('¿Eliminar este gasto?')) {
                expenses = expenses.filter(e => e.id !== id);
                render();
            }
        }

        window.switchTab = (tab) => {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.add('active');
            
            // UI Updates
            const btnReg = document.getElementById('btn-reg');
            const btnHist = document.getElementById('btn-hist');
            if(tab === 'register') {
                btnReg.classList.add('text-blue-600'); btnReg.classList.remove('text-slate-400');
                btnHist.classList.add('text-slate-400'); btnHist.classList.remove('text-blue-600');
            } else {
                btnHist.classList.add('text-blue-600'); btnHist.classList.remove('text-slate-400');
                btnReg.classList.add('text-slate-400'); btnReg.classList.remove('text-blue-600');
            }
        }

        // Service Worker Registration
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        render();
    </script>
</body>
</html>
